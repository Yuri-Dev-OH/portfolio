<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio | Yuri Gonçalves</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg fixed-top custom-nav">
        <div class="container">
            <a class="navbar-brand" href="#inicio">
                <img src="img/icons/portfolio.png" alt="Logo Portfólio">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="#inicio">Início</a>
                    <a class="nav-link" href="#sobre">Sobre</a>
                    <a class="nav-link" href="#tecnologias">Tecnologias</a>
                    <a class="nav-link" href="#projetos">Projetos</a>
                    <a class="nav-link" href="#cursos">Cursos</a> </div>
                </div>
            </div>
        </div>
    </nav>

    <section id="inicio" class="hero-section d-flex align-items-center">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-7">
                    <h1 class="titulo-principal perfil-editavel" id="edit-nome"></h1>
                    <p class="subtitulo perfil-editavel" id="edit-subtitulo"></p>
                    <a href="#projetos" class="btn botao-cta">Ver meus projetos</a>
                </div>
                <div class="col-md-5 text-center">
                    <img src="" alt="Foto Perfil" class="foto-perfil" id="edit-foto">
                    <div class="saudacao-container mt-4">
                        <img src="" alt="Animação de Saudação" id="greeting-gif" class="greeting-gif mb-2" width="120">
                        <h4 id="greeting-text" class="greeting-text"></h4>
                </div>
            </div>
        </div>
    </section>

    <section id="sobre" class="bg-white">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-8 mx-auto text-center">
                    <h2 class="section-title">Sobre Mim</h2>
                    <p class="mt-4 lead perfil-editavel" id="edit-sobre"></p>
                    <a href="arquivos/curriculo.pdf" download="Curriculo_Yuri_Goncalves" class="btn btn-cv mt-4">
                        <i class="devicon-devicon-plain" style="font-size: 1.2rem; margin-right: 8px;"></i>
                        Baixar Currículo
                    </a>
                </div>
            </div>
        </div>
    </section>

    <section id="tecnologias">
        <div class="container">
            <h2 class="section-title text-center mb-5">Minhas Stacks</h2>
            <div class="row g-4" id="container-stacks"></div>
            
            <div class="text-center mt-4" id="btn-add-stack" style="display:none;">
                <button class="btn btn-outline-success" onclick="adicionarStack()">+ Adicionar Stack</button>
            </div>
        </div>
    </section>

    <section id="projetos" class="bg-light">
        <div class="container">
            <h2 class="section-title text-center mb-5">Projetos em Destaque</h2>
            <div class="row g-4 justify-content-center" id="container-projetos"></div>
            
            <div class="text-center mt-4" id="btn-add-projeto" style="display:none;">
                <button class="btn btn-outline-success" onclick="adicionarProjeto()">+ Adicionar Projeto</button>
            </div>
        </div>
    </section>

    <section id="cursos" class="bg-white">
        <div class="container">
            <h2 class="section-title text-center mb-5">Meus Cursos e Certificados</h2>
            <div class="row g-4 justify-content-center" id="container-cursos"></div>
            
            <div class="text-center mt-4" id="btn-add-curso" style="display:none;">
                <button class="btn btn-outline-success" onclick="adicionarCurso()">+ Adicionar Curso</button>
            </div>
        </div>
    </section>

    <div id="container-modais"></div>

    <div class="modal fade" id="modalAdmin" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-sm modal-dialog-centered">
            <div class="modal-content" style="background-color: var(--fundo);">
                <div class="modal-body text-center p-4">
                    <h5 class="mb-3" style="color: var(--cor-principal);">Acesso Restrito</h5>
                    <form onsubmit="event.preventDefault(); verificarSenha();">
                        <input type="password" id="senhaAdmin" class="form-control mb-3" placeholder="Digite a senha" required>
                        <button type="submit" class="btn btn-cv w-100">Entrar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <button id="btnSalvarGeral" class="btn btn-success" style="display:none; position:fixed; bottom:20px; right:20px; z-index:9999; border-radius:30px; padding:10px 25px; font-weight:bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3);" onclick="salvarAlteracoes()">
        💾 Salvar no Banco
    </button>

    <footer class="text-center py-5">
        <p>© 2026 Yuri Gonçalves. Desenvolvido para o curso de DSM.</p>
        <button class="btn btn-link text-muted text-decoration-none" style="font-size: 0.8rem; border: none; background: transparent; padding: 0;" data-bs-toggle="modal" data-bs-target="#modalAdmin">Modo Desenvolvedor</button>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/script.js"></script>
</body>
</html>
